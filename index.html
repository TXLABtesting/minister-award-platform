/* ================= Helpers ================= */
function escAttr(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function navStyle(active) {
  return `border:none;background:${active ? '#E7EDFA' : 'transparent'};color:${active ? '#1D3A8A' : '#566079'};font:600 13px 'IBM Plex Sans Arabic';padding:9px 15px;border-radius:9px;cursor:pointer`;
}
const OPT_NORMAL = "padding:9px 12px;font:500 12.5px 'IBM Plex Sans Arabic';color:#3A4460;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:14px";
const OPT_SEL = "padding:9px 12px;font:600 12.5px 'IBM Plex Sans Arabic';color:#1D3A8A;background:#E7EDFA;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:14px";

function ddCurrent(key) { return S.filterVals[key] || DD_DEFS[key][0]; }

function ddHtml(key, minW, opts) {
  opts = opts || {};
  const options = DD_DEFS[key];
  const cur = ddCurrent(key);
  const open = S.openDd === key;
  const side = opts.side || 'right';
  const trigger = `display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid ${open ? '#1D3A8A' : '#E2E8F2'};background:#fff;border-radius:10px;padding:9px 13px;font:500 13px 'IBM Plex Sans Arabic';color:#131B32;cursor:pointer;${minW};${open ? 'box-shadow:0 0 0 3px rgba(29,58,138,.12)' : ''}`;
  const chev = `transition:transform .18s ease;transform:rotate(${open ? '180deg' : '0deg'});flex:none`;
  const menuStyle = opts.scroll
    ? `position:absolute;top:calc(100% + 6px);${side}:0;width:100%;max-height:280px;overflow-y:auto;background:#fff;border:1px solid #E2E8F2;border-radius:12px;box-shadow:0 14px 34px rgba(19,27,50,.16);padding:6px;z-index:60`
    : `position:absolute;top:calc(100% + 6px);${side}:0;min-width:100%;background:#fff;border:1px solid #E2E8F2;border-radius:12px;box-shadow:0 14px 34px rgba(19,27,50,.16);padding:6px;z-index:60;white-space:nowrap`;
  return `<div style="position:relative">
    <div onclick="A.ddToggle('${key}')" style="${trigger}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cur}</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="${chev}"><path d="M6 9l6 6 6-6" stroke="#566079" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></div>
    ${open ? `<div style="${menuStyle}">${options.map((o, i) => `<div class="opt-h" onclick="A.ddChoose('${key}',${i})" style="${o === cur ? OPT_SEL : OPT_NORMAL}"><span>${o}</span>${o === cur ? '<span style="color:#1D3A8A;font-weight:700;font-size:12px">✓</span>' : ''}</div>`).join('')}</div>` : ''}
  </div>`;
}

/* ================= PROJECTS ================= */
function filteredProjects() {
  const q = S.projSearch.trim();
  const fv = S.filterVals;
  let list = PROJECTS.filter(p => {
    if (q && !(p.name + p.entity).includes(q)) return false;
    if (fv.entity && fv.entity !== 'كل الجهات' && p.entity !== fv.entity) return false;
    if (fv.type && fv.type !== 'النوع: الكل' && p.type !== fv.type) return false;
    if (fv.scope && fv.scope !== 'نطاق التأثير: الكل' && !p.scope.includes(fv.scope)) return false;
    return true;
  });
  if (fv.sort === 'الأبجدي') list = [...list].sort((a, b) => a.name.localeCompare(b.name, 'ar'));
  else if (fv.sort === 'الجهة') list = [...list].sort((a, b) => a.entity.localeCompare(b.entity, 'ar'));
  return list;
}

function nomInput(field, placeholder, extra) {
  extra = extra || '';

function reviewData() {
  const nom = S.nom;
  const D = NOM_FALLBACK;
  const g = (f) => (nom[f] && String(nom[f]).trim()) ? nom[f] : D[f];
  const scope = S.filterVals.fscope || 'على المستوى الحكومي';
  const scopeShort = scope.replace('على مستوى ', '').replace('على المستوى ', '').replace('ال', '');
  return {
    name: S.nomName.trim() || D.name, type: nom.type || 'مشروع', scope: scopeShort,
    dept: g('dept'), summary: g('summary'), description: g('description'), why: g('why'),
    objectives: g('objectives'), problem: g('problem'), results: g('results'), impact: g('impact'),
    deliverables: g('deliverables'), beneficiaries: g('beneficiaries'), progress: g('progress'),
    metrics: g('metrics'), startDate: g('startDate'), endDate: g('endDate'),
    contactName: g('contactName'), contactEmail: g('contactEmail'), contactPhone: g('contactPhone'),
  };
}

  const fid = active && active.dataset ? active.dataset.fid : null;
  let selS = null, selE = null;
  if (fid && typeof active.selectionStart === 'number') { selS = active.selectionStart; selE = active.selectionEnd; }
  app.innerHTML = htmlAll();
  if (fid) {
    const el = app.querySelector('[data-fid="' + fid + '"]');
    if (el) {
      el.focus();
      if (selS !== null) { try { el.setSelectionRange(selS, selE); } catch (e) { /* non-text input */ } }
    }
  }
  tickCountdown();
}

function set(patch) {
  Object.assign(S, typeof patch === 'function' ? patch(S) : patch);
  render();
}

/* countdown — targeted DOM update, no re-render */
function tickCountdown() {
  const target = new Date('2026-11-30T23:59:59').getTime();
  let diff = Math.max(0, target - Date.now());
  const d = Math.floor(diff / 86400000); diff -= d * 86400000;
  const h = Math.floor(diff / 3600000); diff -= h * 3600000;
  const m = Math.floor(diff / 60000); diff -= m * 60000;
  const s = Math.floor(diff / 1000);
  const pad = (n) => String(n).padStart(2, '0');
  const vals = { d: String(d), h: pad(h), m: pad(m), s: pad(s) };
  app.querySelectorAll('[data-cd]').forEach(el => { el.textContent = vals[el.dataset.cd]; });
}
setInterval(tickCountdown, 1000);

/* ================= Actions ================= */
let toastTimer = null;
const A = {
  toastMsg(msg) {
    set({ toast: msg });
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => set({ toast: null }), 3400);
  },
  go(view) {
    const patch = { view, showNotif: false, mobileMenu: false, openDd: null };
    if (view === 'form') patch.formStep = 1;
    if (view === 'results') patch.resultsAdmin = false;
    set(patch);
    window.scrollTo(0, 0);
  },
  setLang(lang) { set({ lang }); },
  toggleNotif() { set({ showNotif: !S.showNotif }); },
  toggleMobile() { set({ mobileMenu: !S.mobileMenu }); },
  closeMobile() { set({ mobileMenu: false }); },
  doLogin() { this.go('home'); this.toastMsg('تم تسجيل الدخول بنجاح'); },
  faqToggle(i) { set({ faqOpen: Object.assign({}, S.faqOpen, { [i]: !S.faqOpen[i] }) }); },

  /* projects */
  setPhase(phase) { set({ phase }); },
  setProjView(projView) { set({ projView }); },
  setProjSearch(e) { set({ projSearch: e.target.value }); },
  vote(i) {
    const nowOn = !S.voted[i];
    set({ voted: Object.assign({}, S.voted, { [i]: nowOn }) });
    if (nowOn) this.toastMsg('تم تسجيل صوتك بنجاح · شكرًا لمشاركتك');
  },
  voteBefore() { this.toastMsg('لم يبدأ التصويت بعد · يبدأ في 1 ديسمبر 2026'); },
  detailVote() {
    if (S.phase === 'before') return this.toastMsg('لم يبدأ التصويت بعد · يبدأ في 1 ديسمبر 2026');
    if (S.phase === 'ended') return this.go('results');
    this.toastMsg('تم تسجيل صوتك بنجاح · شكرًا لمشاركتك');
  },

  /* dropdowns */
  ddToggle(key) { set({ openDd: S.openDd === key ? null : key }); },
  ddChoose(key, i) { set({ filterVals: Object.assign({}, S.filterVals, { [key]: DD_DEFS[key][i] }), openDd: null }); },
  closeDd() { set({ openDd: null }); },

  /* generic state input */
  setS(e, key) { set({ [key]: e.target.value }); },

  /* nomination form */
  setNomName(e) { set({ nomName: e.target.value }); },
  setNomType(i) { set({ nom: Object.assign({}, S.nom, { type: i === 0 ? 'مشروع' : 'مبادرة' }) }); },
  nomSet(e, field) { set({ nom: Object.assign({}, S.nom, { [field]: e.target.value }) }); },
  rowSet(e, key, i, field) {
    set({ [key]: S[key].map((x, j) => j === i ? Object.assign({}, x, { [field]: e.target.value }) : x) });
  },
  rowAdd(key) { set({ [key]: S[key].concat([{ name: '', role: '' }]) }); },
  rowRemove(key, i) { set({ [key]: S[key].filter((x, j) => j !== i) }); },
  formNext() {
    if (S.formStep === 1 && !S.nomName.trim()) {
      set({ formErr: true });
      this.toastMsg('يرجى تعبئة الحقول المطلوبة قبل المتابعة');
      return;
    }
    set({ formStep: Math.min(4, S.formStep + 1), formErr: false });
    window.scrollTo(0, 0);
  },
  formPrev() { set({ formStep: Math.max(1, S.formStep - 1) }); window.scrollTo(0, 0); },
  saveDraft() { this.toastMsg('تم حفظ الترشيح كمسودة · يمكنك العودة لاحقًا'); },
  submitNom() { set({ view: 'entity' }); this.toastMsg('تم إرسال الترشيح'); window.scrollTo(0, 0); },

  /* admin */
  setTab(adminTab) { set({ adminTab }); window.scrollTo(0, 0); },
  setReviewFilter(reviewFilter) { set({ reviewFilter }); },
  toggleVoting() {
    const n = !S.votingOpen;
    set({ votingOpen: n });
    this.toastMsg(n ? 'تم فتح التصويت للموظفين' : 'تم إغلاق التصويت');
  },
  tlChange(e) { set({ tl: Object.assign({}, S.tl, { [e.target.dataset.k]: e.target.value }) }); },
  tlSave() {
    const tl = S.tl;
    const pairs = [['launchS', 'launchE', 'الإطلاق والإعلان'], ['nomS', 'nomE', 'استقبال الترشيحات'], ['voteS', 'voteE', 'التصويت العام'], ['winS', 'winE', 'إعلان الفائزين']];
    for (const p of pairs) {
      if (!tl[p[0]] || !tl[p[1]]) return this.toastMsg('يرجى تحديد تاريخي البداية والنهاية لمرحلة ' + p[2]);
      if (tl[p[0]] > tl[p[1]]) return this.toastMsg('تاريخ النهاية يجب أن يكون بعد البداية في مرحلة ' + p[2]);
    }
    this.toastMsg('تم حفظ الجدول الزمني للنسخة الحالية بنجاح');
  },
  newEdition() { this.toastMsg('سيتم إنشاء نسخة 2027 عند إغلاق النسخة الحالية وإعلان نتائجها'); },
  viewEdition(year) {
    set({ view: 'results', resultsAdmin: true, filterVals: Object.assign({}, S.filterVals, { fresYear: year }) });
    window.scrollTo(0, 0);
  },

  /* review workflow */
  openModal(modal) { set({ modal }); },
  closeModal() { set({ modal: null }); },
  confirmApprove() { set({ view: 'admin' }); this.toastMsg('تم اعتماد الترشيح ونشره في صفحة التصويت'); window.scrollTo(0, 0); },
  confirmReject() { set({ view: 'admin', modal: null, rejectReason: '' }); this.toastMsg('تم رفض الترشيح وإبلاغ الجهة بالسبب'); window.scrollTo(0, 0); },
  confirmEdit() { set({ view: 'admin', modal: null, editNotes: '' }); this.toastMsg('تمت إعادة الترشيح إلى الجهة لإجراء التعديلات'); window.scrollTo(0, 0); },

  /* results */
  approveResults() { this.toastMsg('تم اعتماد النتيجة النهائية للنسخة الحالية'); },
  publishWinners() {
    if (S.winnersPublished) return this.toastMsg('النتائج منشورة بالفعل للجميع');
    set({ winnersPublished: true });
    this.toastMsg('تم نشر الفائزين · أصبحت النتائج مرئية لجميع الموظفين والجهات');
  },

  /* reports */
  openReport(type, fmt) { set({ report: { type, fmt } }); },
  closeReport() { set({ report: null }); },
  downloadReport() { set({ report: null }); this.toastMsg('جاري تجهيز الملف · سيبدأ التنزيل تلقائيًا'); },
};
window.A = A;

render();
</script>
</body>
